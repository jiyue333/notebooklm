global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/notebooklm-rules.yml

scrape_configs:
  - job_name: notebooklm-api
    metrics_path: /api/metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: api

  - job_name: notebooklm-worker
    static_configs:
      - targets: ["host.docker.internal:9101"]
        labels:
          service: worker

  - job_name: notebooklm-scheduler
    static_configs:
      - targets: ["host.docker.internal:9102"]
        labels:
          service: scheduler

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          service: kafka

  - job_name: notebooklm-node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node

  - job_name: notebooklm-redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  - job_name: notebooklm-postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
