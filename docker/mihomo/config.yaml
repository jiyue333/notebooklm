socks-port: 7891
mixed-port: 7893
allow-lan: true
bind-address: 0.0.0.0
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090

proxy-providers:
  subscription:
    type: http
    url: "__MIHOMO_SUBSCRIPTION_URL__"
    path: ./providers/subscription.yaml
    interval: 21600
    proxy: DIRECT
    header:
      User-Agent:
        - "clash.meta"
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: Proxy
    type: url-test
    use:
      - subscription
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

rules:
  - MATCH,Proxy
mixed-port: 7890
allow-lan: false
bind-address: 0.0.0.0
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090

proxy-providers:
  default:
    type: http
    url: "__MIHOMO_SUBSCRIPTION_URL__"
    path: ./providers/default.yaml
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: Proxy
    type: select
    use:
      - default
    proxies:
      - DIRECT

rules:
  - MATCH,Proxy
