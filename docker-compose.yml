services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: notebooklm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notebooklm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notebooklm" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: notebooklm-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_DISABLE_POSTFIX: "true"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

  redis:
    image: redis:7-alpine
    container_name: notebooklm-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: notebooklm-redis-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: notebooklm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ollama:
  #   image: ollama/ollama
  #   container_name: notebooklm-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  # ollama-model-init:
  #   image: ollama/ollama
  #   container_name: notebooklm-ollama-model-init
  #   depends_on:
  #     - ollama
  #   restart: "no"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   entrypoint: ["/bin/sh", "-c"]
  #   command: >
  #     "
  #     until OLLAMA_HOST=http://ollama:11434 ollama list >/dev/null 2>&1; do
  #       sleep 2;
  #     done;
  #     OLLAMA_HOST=http://ollama:11434 ollama pull qwen3.5:0.8b;
  #     OLLAMA_HOST=http://ollama:11434 ollama pull qwen3-embedding:0.6b;
  #     "

  kafka:
    image: apache/kafka:3.9.1
    container_name: notebooklm-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      start_period: 30s
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: notebooklm-kafka-exporter
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "--kafka.server=kafka:9092"
      - "--web.listen-address=:9308"
    ports:
      - "9308:9308"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    container_name: notebooklm-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: postgres:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: postgres
    ports:
      - "9187:9187"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: notebooklm-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.textfile.directory=/textfile_collector"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - ./backend/evals/reports/prometheus:/textfile_collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    container_name: notebooklm-otel-collector
    restart: unless-stopped
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  tempo:
    image: grafana/tempo:2.7.2
    container_name: notebooklm-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo/config.yaml" ]
    ports:
      - "3200:3200"
    volumes:
      - ./docker/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo

  loki:
    image: grafana/loki:3.4.1
    container_name: notebooklm-loki
    restart: unless-stopped
    command: [ "-config.file=/etc/loki/config.yaml" ]
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.1
    container_name: notebooklm-promtail
    restart: unless-stopped
    command: [ "-config.file=/etc/promtail/config.yaml" ]
    depends_on:
      - loki
    volumes:
      - ./docker/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - ./logs:/workspace/logs:ro
      - promtail_data:/tmp

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: notebooklm-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/notebooklm-rules.yml:/etc/prometheus/notebooklm-rules.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.5.2
    container_name: notebooklm-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_INSTALL_PLUGINS: redis-datasource,hamedkarbasi93-kafka-datasource
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  minio_data: # ollama_data:
  tempo_data:
  loki_data:
  promtail_data:
  prometheus_data:
  grafana_data:
