services:
  postgres:
    image: postgres:16-alpine
    container_name: notebooklm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notebooklm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notebooklm"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: notebooklm-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@notebooklm.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_DISABLE_POSTFIX: "true"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

  redis:
    image: redis:7-alpine
    container_name: notebooklm-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: notebooklm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    container_name: notebooklm-rmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
    ports:
      - "9876:9876"
    volumes:
      - ./docker/rocketmq/namesrv/logs:/home/rocketmq/logs

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    container_name: notebooklm-rmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/broker.conf
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    ports:
      - "10911:10911"
      - "10909:10909"
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/broker.conf:ro
      - ./docker/rocketmq/broker/logs:/home/rocketmq/logs
      - ./docker/rocketmq/broker/store:/home/rocketmq/store

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    platform: linux/amd64
    container_name: notebooklm-rmq-dashboard
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8088:8080"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  minio_data:
