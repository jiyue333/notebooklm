services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: notebooklm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notebooklm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notebooklm" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: notebooklm-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_DISABLE_POSTFIX: "true"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

  redis:
    image: redis:7-alpine
    container_name: notebooklm-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: notebooklm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama
    container_name: notebooklm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-model-init:
    image: ollama/ollama
    container_name: notebooklm-ollama-model-init
    depends_on:
      - ollama
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      until OLLAMA_HOST=http://ollama:11434 ollama list >/dev/null 2>&1; do
        sleep 2;
      done;
      OLLAMA_HOST=http://ollama:11434 ollama pull qwen3.5:0.8b;
      OLLAMA_HOST=http://ollama:11434 ollama pull qwen3-embedding:0.6b;
      "

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    container_name: notebooklm-rmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
    ports:
      - "9876:9876"
    volumes:
      - ./docker/rocketmq/namesrv/logs:/home/rocketmq/logs

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    container_name: notebooklm-rmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/broker.conf
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    ports:
      - "10911:10911"
      - "10909:10909"
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/broker.conf:ro
      - ./docker/rocketmq/broker/logs:/home/rocketmq/logs
      - ./docker/rocketmq/broker/store:/home/rocketmq/store

  rocketmq-proxy:
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    container_name: notebooklm-rmq-proxy
    restart: unless-stopped
    depends_on:
      - rocketmq-broker
    command: sh mqproxy -n rocketmq-namesrv:9876 -pc /home/rocketmq/proxy.json
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
    ports:
      - "8081:8081"
    volumes:
      - ./docker/rocketmq/proxy.json:/home/rocketmq/proxy.json:ro

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    platform: linux/amd64
    container_name: notebooklm-rmq-dashboard
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8088:8082"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    container_name: notebooklm-otel-collector
    restart: unless-stopped
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  tempo:
    image: grafana/tempo:2.7.2
    container_name: notebooklm-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo/config.yaml" ]
    ports:
      - "3200:3200"
    volumes:
      - ./docker/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo

  loki:
    image: grafana/loki:3.4.1
    container_name: notebooklm-loki
    restart: unless-stopped
    command: [ "-config.file=/etc/loki/config.yaml" ]
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.1
    container_name: notebooklm-promtail
    restart: unless-stopped
    command: [ "-config.file=/etc/promtail/config.yaml" ]
    depends_on:
      - loki
    volumes:
      - ./docker/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - ./logs:/workspace/logs:ro
      - promtail_data:/tmp

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: notebooklm-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.5.2
    container_name: notebooklm-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  minio_data:
  ollama_data:
  tempo_data:
  loki_data:
  promtail_data:
  prometheus_data:
  grafana_data:
