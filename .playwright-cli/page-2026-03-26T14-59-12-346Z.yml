        - heading "Is LangChain really free?" [level=3] [ref=e462]
        - paragraph [ref=e463]: Yes, the core LangChain framework is completely free and open-source under the MIT license with no usage restrictions. You can build and deploy unlimited AI agents on your own infrastructure without paying anything. The LangSmith monitoring platform offers a Developer plan with 5k traces per month free (supporting 15-20k agent interactions), which covers prototypes and small production apps. However, if you need more traces, agent deployment infrastructure, or email support, you'll need the Plus plan at $39/seat/month. The framework itself remains free forever - you only pay for optional monitoring and hosting services.
