                    - generic [ref=e515]: "subgraphs solve this by letting you treat any compiled graph as a node inside a parent graph. Each subgraph ... ``` # LangGraph 0.3+ required for stable subgraph support pip install langgraph>=0.3.0 langchain-openai>=0.2.0 --break-system-packages ... ``` result = agent.invoke({ \"user_question\": \"What are the main new features in LangGraph 0.3?\", ... --- ## Summary - Subgraphs are compiled graphs used as nodes — they own private state and only expose what you map out - State transformers are the seam between parent and subgraph: explicit, testable, and the first place to look when things break - LangGraph 0.3 supports direct`add_node(subgraph)` when schemas share key names - Each subgraph should be independently runnable and testable before wiring into a parent - Checkpointing lives at the parent level; subgraph-internal state is ephemeral unless you opt in Composable subgraphs pay off in proportion to how many agents you build. The upfront cost is the schema design work — get that right and you'll reuse the same research, retrieval, or validation subgraph across a dozen parent graphs. Tested on LangGraph 0.3.2, langchain-openai 0.2.14, Python 3.12, Ubuntu 24.04 ... informational medium recent ### CrewAI 1.10.1 New Features: What Changed in 2026 CrewAI 1.10.1 ships Gemini GenAI upgrades, A2A Jupyter support, MCP tool fixes, and security patches. Here's what ... informational medium recent ### ["
